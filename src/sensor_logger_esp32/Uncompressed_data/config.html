<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Log Configuration</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
label { margin-right: 10px; }
input[type=number] { width: 60px; }
select { width: 40px; margin-right: 40px; } /* narrow dropdown + spacing */
button { margin-left: 5px; }
#calc { margin-top: 20px; padding: 10px; border: 1px solid #ccc; width: 500px; }
#fileControls { margin-top: 10px; display: flex; align-items: center; }
#fileSlider { width: 200px; vertical-align: middle; }
#logSize { margin-left: 20px; font-weight: bold; }
</style>
</head>
<body>

<h2>Log Settings</h2>

<form id="logForm">
  <label>Interval:</label>
  <input type="number" id="intervalValue" min="1" value="15">
  <select id="intervalUnit">
    <option value="1">s</option>
    <option value="60">m</option>
    <option value="3600">h</option>
  </select>

  <!-- Shortcut Buttons -->
  <button type="button" onclick="setIntervalShortcut(10,'s')">10s</button>
  <button type="button" onclick="setIntervalShortcut(1,'m')">1m</button>
  <button type="button" onclick="setIntervalShortcut(10,'m')">10m</button>
  <button type="button" onclick="setIntervalShortcut(20,'m')">20m</button>
  <button type="button" onclick="setIntervalShortcut(1,'h')">1h</button>
  <br><br>

  <div id="fileControls">
		<label>Log Size:</label>
    <input type="range" id="fileSlider" min="2" max="48" value="16" oninput="updateSliderValue()">
    <div style="display:flex; margin-left: 10px;">
      <button type="button" onclick="setNumFilesPreset(16)">Small</button>
      <button type="button" onclick="setNumFilesPreset(32)">Mid</button>
      <button type="button" onclick="setNumFilesPreset(48)">Big</button>
    </div>
    <div id="logSize">?? (? chunks))</div>
  </div>
</form>

<div id="calc">
  <h3>Calculation</h3>
  <p>Interval in seconds: <span id="intervalSec"></span>s</p>
  <p>Max chunk size: 32 kB</p>
  <p>Estimated log duration (min): <span id="logDuration"></span></p>
</div>

<script>
const maxChunkKB = 32;
const entrySize = 47; // Bytes per log entry
const entriesPerChunk = (maxChunkKB*1024)/entrySize;

const intervalValueEl = document.getElementById('intervalValue');
const intervalUnitEl = document.getElementById('intervalUnit');
const fileSliderEl = document.getElementById('fileSlider');
const logSizeEl = document.getElementById('logSize');

function formatDuration(seconds) {
  const days = Math.floor(seconds / 86400);
  seconds %= 86400;
  const hours = Math.floor(seconds / 3600);
  seconds %= 3600;
  const minutes = Math.floor(seconds / 60);
  return `${days} days, ${hours} hours, ${minutes} minutes`;
}

function updateCalculation() {
  let interval = parseFloat(intervalValueEl.value);
  let unit = parseFloat(intervalUnitEl.value);
  let intervalSec = interval * unit;

  let numChunks = parseInt(fileSliderEl.value);
  let calcChunks = Math.max(1, numChunks - 1); // reserve one chunk for deletion

  let totalSizeKB = numChunks * maxChunkKB;
  let totalDurationSec = intervalSec * entriesPerChunk * calcChunks;

  document.getElementById('intervalSec').textContent = intervalSec;
  logSizeEl.textContent = `${totalSizeKB.toFixed(1)} kB (${numChunks} chunks)`;
  document.getElementById('logDuration').textContent = formatDuration(totalDurationSec);
}

function setIntervalShortcut(value, unitStr) {
  intervalValueEl.value = value;
  if(unitStr === 's') intervalUnitEl.value = 1;
  else if(unitStr === 'm') intervalUnitEl.value = 60;
  else if(unitStr === 'h') intervalUnitEl.value = 3600;
  updateCalculation();
}

function setNumFilesPreset(num) {
  fileSliderEl.value = num;
  updateCalculation();
}

function updateSliderValue() {
  updateCalculation();
}

// Events
intervalValueEl.addEventListener('input', updateCalculation);
intervalUnitEl.addEventListener('change', updateCalculation);
fileSliderEl.addEventListener('input', updateCalculation);

// Initial
updateCalculation();
</script>

</body>
</html>
