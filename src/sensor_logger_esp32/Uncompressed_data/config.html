<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Log-Konfiguration</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
label { margin-right: 10px; }
input[type=number] { width: 60px; }
select { width: 40px; margin-right: 40px; } /* schmaler + Abstand zu Buttons */
button { margin: 0 5px 5px 0; }
#calc { margin-top: 20px; padding: 10px; border: 1px solid #ccc; width: 440px; }
</style>
</head>
<body>

<h2>Log-Einstellungen</h2>

<form id="logForm">
  <label>Intervall:</label>
  <input type="number" id="intervalValue" min="1" value="15">
  <select id="intervalUnit">
    <option value="1">s</option>
    <option value="60">m</option>
    <option value="3600">h</option>
  </select>

  <!-- Shortcut Buttons -->
  <button type="button" onclick="setIntervalShortcut(10,'s')">10s</button>
  <button type="button" onclick="setIntervalShortcut(1,'m')">1m</button>
  <button type="button" onclick="setIntervalShortcut(10,'m')">10m</button>
  <button type="button" onclick="setIntervalShortcut(20,'m')">20m</button>
  <button type="button" onclick="setIntervalShortcut(1,'h')">1h</button>
  <br><br>

  <label>Anzahl Log-Dateien:</label>
  <input type="number" id="numFiles" min="2" max="48" value="10">
</form>

<div id="calc">
  <h3>Berechnung</h3>
  <p>Interval in Sekunden: <span id="intervalSec"></span>s</p>
  <p>Max Log-Dateigröße: 32 kB</p>
  <p>Gesamt-Loggröße: <span id="totalSize"></span> kB</p>
  <p>Geschätzte Log-Dauer (Mindestwert): <span id="logDuration"></span></p>
</div>

<script>
const maxFileSizeKB = 32;
const entrySize = 47; // Bytes pro Logeintrag
const entriesPerFile = (maxFileSizeKB*1024)/entrySize;

function formatDuration(seconds) {
  const days = Math.floor(seconds / 86400);
  seconds %= 86400;
  const hours = Math.floor(seconds / 3600);
  seconds %= 3600;
  const minutes = Math.floor(seconds / 60);
  return `${days} Tage, ${hours} Stunden, ${minutes} Minuten`;
}

function updateCalculation() {
  let interval = parseFloat(document.getElementById('intervalValue').value);
  let unit = parseFloat(document.getElementById('intervalUnit').value);
  let intervalSec = interval * unit;

  let numFiles = parseInt(document.getElementById('numFiles').value);
  let calcFiles = Math.max(1, numFiles - 1); // ein File für Löschvorgang abziehen

  let totalSizeKB = numFiles * maxFileSizeKB;
  let totalDurationSec = intervalSec * entriesPerFile * calcFiles;

  document.getElementById('intervalSec').textContent = intervalSec;
  document.getElementById('totalSize').textContent = totalSizeKB.toFixed(1);
  document.getElementById('logDuration').textContent = formatDuration(totalDurationSec);
}

function setIntervalShortcut(value, unitStr) {
  document.getElementById('intervalValue').value = value;
  let unitSelect = document.getElementById('intervalUnit');
  if(unitStr === 's') unitSelect.value = 1;
  else if(unitStr === 'm') unitSelect.value = 60;
  else if(unitStr === 'h') unitSelect.value = 3600;
  updateCalculation();
}

// Events
document.getElementById('intervalValue').addEventListener('input', updateCalculation);
document.getElementById('intervalUnit').addEventListener('change', updateCalculation);
document.getElementById('numFiles').addEventListener('input', updateCalculation);

// Initial
updateCalculation();
</script>

</body>
</html>
