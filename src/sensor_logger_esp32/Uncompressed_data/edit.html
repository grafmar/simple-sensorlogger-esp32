<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTML Uploader</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
<center>

<h1>File Upload</h1>

<form method="POST"
      action="/edit.html"
      enctype="multipart/form-data">

  <input type="file"
         name="file"
         accept=".gz,.html,.ico,.js,.css">

  <br><br>

  <input type="submit" value="Upload">

</form>

</center>
</body>
</html>
